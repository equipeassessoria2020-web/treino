    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>

<body class="bg-zinc-950 text-white min-h-screen pb-24">

    <!-- Header Estilo Smart Fit -->

    <!-- Modal do Cronômetro de Descanso -->

            <button onclick="fecharCronometro()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-extrabold py-3 rounded-xl text-sm uppercase transition-all">
                Pular Descanso
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6">
        
        <!-- Seleção de Usuário -->
        <div class="grid grid-cols-2 gap-2 mb-6">
            <button id="btn-paulino" onclick="setUsuario('Paulino')" class="py-3.5 px-4 rounded-xl font-black uppercase text-xs tracking-wider shadow transition-all duration-200 bg-yellow-500 text-black">
                <i class="fa-solid fa-user mr-1.5"></i>Paulino
            </button>
            <button id="btn-esposa" onclick="setUsuario('Esposa')" class="py-3.5 px-4 rounded-xl font-black uppercase text-xs tracking-wider shadow transition-all duration-200 bg-zinc-900 text-gray-400 border border-zinc-800">
                <i class="fa-solid fa-user-tie mr-1.5"></i>Esposa
            </button>
        </div>

        <!-- Meta e Dados do Aluno -->
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-850 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Foco do Aluno</h2>
                    <p id="user-objetivo" class="font-extrabold text-white text-sm mt-0.5">Carregando...</p>
                </div>
                <div class="text-right">
                    <span id="user-info" class="text-[10px] bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 px-2.5 py-1 rounded-full font-bold">53 anos | 67kg</span>
                </div>
            </div>
        </div>

        <!-- Abas de Treino A / B -->
        <div class="flex bg-zinc-900 p-1.5 rounded-xl mb-6 border border-zinc-800">
            <button id="btn-treinoA" onclick="setTreino('Treino A')" class="flex-1 py-2.5 text-center rounded-lg font-black uppercase text-xs tracking-wider transition-all bg-yellow-500 text-black shadow">
                Treino A
            </button>
            <button id="btn-treinoB" onclick="setTreino('Treino B')" class="flex-1 py-2.5 text-center rounded-lg font-black uppercase text-xs tracking-wider transition-all text-gray-400">
                Treino B
            </button>
        </div>

        <!-- Descrição do Foco do Dia -->
        <div class="mb-6 bg-zinc-900/40 p-3 rounded-xl border border-zinc-900">
            <p id="foco-treino" class="text-[10px] uppercase tracking-widest text-yellow-500 font-black">Foco de Hoje</p>
            <h3 id="foco-descricao" class="text-base font-extrabold text-white">Carregando...</h3>
        </div>

        <!-- Lista de Exercícios -->
        <div id="lista-exercicios" class="space-y-4">
            <!-- Exercícios carregados dinamicamente -->
        </div>

        <!-- Botão Reset -->
        <button onclick="resetarTreino()" class="w-full mt-10 py-3.5 bg-zinc-900 hover:bg-zinc-850 text-red-500 border border-red-500/20 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">
            <i class="fa-solid fa-trash-can mr-2"></i>Resetar Progresso de Hoje
        </button>

    </div>

            // ESPOSA - TREINO A (Coxas, Glúteos e Abdômen)
            { usuario: "Esposa", objetivo: "Recomposição e tonificação", treino: "Treino A", foco: "Coxas, Glúteos e Abdômen", exercicio: "Cadeira Extensora", desenho: "🦵⚽", dicatexto: "Sente-se no aparelho da estação, apoie os pés atrás do rolo estofado e empurre para cima esticando os joelhos.", equip: "Estação (Pernas)", series: 3, reps: "12 a 15", desc: "1 min", descSeg: 60, buscaQuery: "extensor de pernas na estacao de musculacao multifuncional" },

            { usuario: "Esposa", objetivo: "Recomposição e tonificação", treino: "Treino A", foco: "Coxas, Glúteos e Abdômen", exercicio: "Cardio: Bicicleta", desenho: "🚴‍♀️💨", dicatexto: "Finalize o treino pedalando na bicicleta para queima de gordura e condicionamento.", equip: "Bicicleta Ergofit", series: "Única", reps: "20 min", desc: "Fim do Treino", descSeg: 0, buscaQuery: "treino de bicicleta ergometrica" },

            // ESPOSA - TREINO B (Membros Superiores)

            { usuario: "Esposa", objetivo: "Recomposição e tonificação", treino: "Treino B", foco: "Costas, Braços e Ombros", exercicio: "Elevação Lateral", desenho: "👐🏋️‍♀️", dicatexto: "Use halteres leves nas laterais do corpo e suba os braços até a altura dos ombros.", equip: "Halteres Leves", series: 3, reps: "12", desc: "45 seg", descSeg: 45, buscaQuery: "elevacao lateral com halteres" },

            { usuario: "Esposa", objetivo: "Recomposição e tonificação", treino: "Treino B", foco: "Costas, Braços e Ombros", exercicio: "Tríceps na Polia (Corda)", desenho: "⬇️🔌", dicatexto: "Segure a corda na polia alta da estação e estique os braços para baixo colando os cotovelos nas costelas.", equip: "Estação (Corda)", series: 3, reps: "12", desc: "45 seg", descSeg: 45, buscaQuery: "triceps na polia alta da estacao de musculacao" },
            { usuario: "Esposa", objetivo: "Recomposição e tonificação", treino: "Treino B", foco: "Costas, Braços e Ombros", exercicio: "Cardio: Esteira", desenho: "🏃‍♀️💨", dicatexto: "Termine fazendo uma caminhada firme de 20 minutos na esteira para queimar calorias.", equip: "Esteira (Caminhada Firme)", series: "Única", reps: "20 min", desc: "Fim do Treino", descSeg: 0, buscaQuery: "caminhada acelerada esteira esteira movimento correto" }
        ];

        let usuarioAtivo = "Paulino";
        let treinoAtivo = "Treino A";
        let timerInterval;

        function setUsuario(nome) {
            usuarioAtivo = nome;
            const btnP = document.getElementById('btn-paulino');
            const btnE = document.getElementById('btn-esposa');
            if (nome === 'Paulino') {
                btnP.className = "py-3.5 px-4 rounded-xl font-black uppercase text-xs tracking-wider shadow transition-all duration-200 bg-yellow-500 text-black";
                btnE.className = "py-3.5 px-4 rounded-xl font-black uppercase text-xs tracking-wider shadow transition-all duration-200 bg-zinc-900 text-gray-400 border border-zinc-800";
            } else {
                btnE.className = "py-3.5 px-4 rounded-xl font-black uppercase text-xs tracking-wider shadow transition-all duration-200 bg-yellow-500 text-black";
                btnP.className = "py-3.5 px-4 rounded-xl font-black uppercase text-xs tracking-wider shadow transition-all duration-200 bg-zinc-900 text-gray-400 border border-zinc-800";
            }
            render();
        }

        function setTreino(tipo) {
            treinoAtivo = tipo;
            const btnA = document.getElementById('btn-treinoA');
            const btnB = document.getElementById('btn-treinoB');
            if (tipo === 'Treino A') {
                btnA.className = "flex-1 py-2.5 text-center rounded-lg font-black uppercase text-xs tracking-wider transition-all bg-yellow-500 text-black shadow";
                btnB.className = "flex-1 py-2.5 text-center rounded-lg font-black uppercase text-xs tracking-wider transition-all text-gray-400";
            } else {
                btnB.className = "flex-1 py-2.5 text-center rounded-lg font-black uppercase text-xs tracking-wider transition-all bg-yellow-500 text-black shadow";
                btnA.className = "flex-1 py-2.5 text-center rounded-lg font-black uppercase text-xs tracking-wider transition-all text-gray-400";
            }
            render();
        }

        function toggleExercicio(id) {
            const check = document.getElementById(id);
            localStorage.setItem(id, check.checked);
            const card = document.getElementById('card-' + id);
            if (check.checked) {
                card.classList.add('opacity-40', 'bg-zinc-950/20');
            } else {
                card.classList.remove('opacity-40', 'bg-zinc-950/20');
            }
        }

        // Sistema de Som e Fala por Inteligência de Voz do Navegador
        function falar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'pt-BR';
                utterance.rate = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        function abrirCronometro(segundos) {
            if (segundos <= 0) return;
            document.getElementById('timer-modal').classList.remove('hidden');
            let tempoRestante = segundos;
            
            clearInterval(timerInterval);
            atualizarTextoTimer(tempoRestante);
            falar("Iniciando descanso.");

            timerInterval = setInterval(() => {
                tempoRestante--;
                atualizarTextoTimer(tempoRestante);

                if (tempoRestante === 30) {
                    falar("Trinta segundos restantes.");
                } else if (tempoRestante === 10) {
                    falar("Dez segundos. Prepare-se.");
                } else if (tempoRestante === 3) {
                    falar("Três");
                } else if (tempoRestante === 2) {
                    falar("Dois");
                } else if (tempoRestante === 1) {
                    falar("Um");
                }

                if (tempoRestante <= 0) {
                    clearInterval(timerInterval);
                    falar("Fim do descanso! Volte para a próxima série.");
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    fecharCronometro();
                }
            }, 1000);
        }

        function atualizarTextoTimer(segundos) {
            const min = Math.floor(segundos / 60).toString().padStart(2, '0');
            const seg = (segundos % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${min}:${seg}`;
        }

        function fecharCronometro() {
            clearInterval(timerInterval);
            document.getElementById('timer-modal').classList.add('hidden');
        }

        function resetarTreino() {
            if (confirm("Quer desmarcar os exercícios concluídos de hoje?")) {
                const filtrados = dados.filter(d => d.usuario === usuarioAtivo && d.treino === treinoAtivo);
                filtrados.forEach(ex => {
                    const id = `${usuarioAtivo}-${treinoAtivo}-${ex.exercicio}`.replace(/\s+/g, '-');
                    localStorage.removeItem(id);
                });
                render();
            }
        }

        function render() {
            const filtrados = dados.filter(d => d.usuario === usuarioAtivo && d.treino === treinoAtivo);
            let perfil = dados.find(d => d.usuario === usuarioAtivo);
            
            // Dados personalizados do aluno
            let infoText = usuarioAtivo === "Paulino" ? "53 anos | 1.65m | 67kg" : "48 anos | 1.67m | 77kg";
            
            document.getElementById('user-objetivo').innerText = perfil.objetivo;
            document.getElementById('user-info').innerText = infoText;
            document.getElementById('foco-descricao').innerText = filtrados[0] ? filtrados[0].foco : "";

            const container = document.getElementById('lista-exercicios');
            container.innerHTML = "";

            filtrados.forEach((ex) => {
                const idUnico = `${usuarioAtivo}-${treinoAtivo}-${ex.exercicio}`.replace(/\s+/g, '-');
                const marcado = localStorage.getItem(idUnico) === "true";
                const cardClass = marcado ? "bg-zinc-950/20 opacity-40 border-zinc-900" : "bg-zinc-900 border-zinc-800";

                // Botão do cronômetro com áudio se houver tempo de descanso
                const btnDescanso = ex.descSeg > 0 
                    ? `<button onclick="abrirCronometro(${ex.descSeg})" class="mt-2.5 w-full bg-zinc-800 hover:bg-zinc-750 text-gray-300 font-bold py-2 rounded-xl text-xs flex items-center justify-center border border-zinc-700/50">
                            <i class="fa-regular fa-clock mr-1.5 text-yellow-500"></i>Contar Descanso (${ex.desc})
                       </button>` 
                    : `<div class="mt-2 text-xs text-gray-500 font-medium py-1.5"><i class="fa-solid fa-flag-checkered mr-1.5 text-yellow-500"></i>${ex.desc}</div>`;

                // URL de busca refinada direcionada especificamente para aparelhos multifuncionais estilo a sua estação
                const linkBuscaYoutube = `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.buscaQuery)}`;

                container.innerHTML += `
                    <div id="card-${idUnico}" class="p-4 rounded-2xl shadow-md border transition-all duration-150 flex flex-col justify-between ${cardClass}">
                        <div class="flex items-start justify-between">
                            <div class="flex-1 pr-4">
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl">${ex.desenho}</span>
                                    <h4 class="font-extrabold text-white text-base leading-tight">${ex.exercicio}</h4>
                                </div>
                                <p class="text-xs text-yellow-500 font-bold mt-1"><i class="fa-solid fa-screwdriver-wrench mr-1"></i>${ex.equip}</p>
                            </div>
                            <div>
                                <input id="${idUnico}" type="checkbox" onchange="toggleExercicio('${idUnico}')" ${marcado ? 'checked' : ''} 
                                    class="w-7 h-7 text-yellow-500 bg-zinc-800 border-zinc-700 rounded-lg focus:ring-yellow-500 accent-yellow-500">
                            </div>
                        </div>

                        <!-- Dica de execução detalhada da máquina -->
                        <p class="text-[11px] text-gray-400 mt-2 italic leading-relaxed bg-zinc-950/40 p-2 rounded-lg border border-zinc-850">${ex.dicatexto}</p>

                        <div class="flex gap-4 mt-3 text-[11px] text-gray-400 border-t border-zinc-800/60 pt-3">
                            <span>Séries: <strong class="text-white font-bold">${ex.series}</strong></span>
                            <span>Reps: <strong class="text-white font-bold">${ex.reps}</strong></span>
                        </div>

                        <div class="grid grid-cols-2 gap-2 mt-3 pt-1">
                            <a href="${linkBuscaYoutube}" target="_blank" class="bg-yellow-500/10 text-yellow-500 hover:bg-yellow-500/20 font-bold py-2 rounded-xl text-xs flex items-center justify-center border border-yellow-500/20">
                                <i class="fa-solid fa-magnifying-glass mr-1.5 text-yellow-500 text-sm"></i>Como Fazer
                            </a>
                            ${btnDescanso}
                        </div>
                    </div>
                `;
            });
        }

        render();
    </script>
</body>
</html>
